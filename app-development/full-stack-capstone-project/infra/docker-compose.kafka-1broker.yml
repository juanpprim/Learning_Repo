# Kafka overlay #1: a single KRaft broker (no ZooKeeper) — the simplest
# topology for studying partitions and consumer groups.
#
#   docker compose -f infra/docker-compose.yml \
#                  -f infra/docker-compose.kafka-1broker.yml up -d
#
# Two listeners: containers talk to kafka:19092, host tools use localhost:9092.

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single broker => everything at replication factor 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # One-shot topic creation. 3 partitions on the request topic so `--scale`
  # experiments with consumer groups actually redistribute work.
  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    # The whole script must reach `sh -c` as ONE argument, hence the block scalar.
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists \
          --topic prediction-requests --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists \
          --topic prediction-results --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list

  # The Spark Structured Streaming prediction consumer (see backend/spark/).
  # Built as an image because the host JVM is too new for Spark.
  spark-consumer:
    build:
      context: ../backend
      dockerfile: spark/Dockerfile
    depends_on:
      # Wait for the topics to EXIST, not just the broker — subscribing to a
      # missing topic kills the streaming query at startup.
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      DATABASE_URL: postgresql+psycopg2://capstone:capstone@postgres:5432/capstone
      MLFLOW_TRACKING_URI: http://mlflow:5000
    # Spark's own Prometheus servlet lives on the driver UI port.
    ports:
      - "4040:4040"

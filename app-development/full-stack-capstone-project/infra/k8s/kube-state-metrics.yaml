# kube-state-metrics: turns k8s object state (deployments, pods, replicas)
# into Prometheus metrics. This is what feeds the "pod count scaling with
# load" Grafana panel.
#
# Minimal vendored manifest (upstream ships a bigger kustomize bundle):
# ServiceAccount + read-only RBAC + Deployment + NodePort Service. The
# NodePort (30080) is mapped to the host by k3d (`-p 30080:30080@server:0`),
# so the compose Prometheus scrapes it via host.docker.internal:30080.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  # Read-only on the object kinds we chart. KSM only ever LISTs/WATCHes.
  - apiGroups: [""]
    resources: [pods, nodes, services, endpoints, namespaces]
    verbs: [list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: kube-system
  labels:
    app: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.14.0
          args:
            # Only collect what the dashboard uses — keeps cardinality tiny.
            - --resources=deployments,pods,horizontalpodautoscalers
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app: kube-state-metrics
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080

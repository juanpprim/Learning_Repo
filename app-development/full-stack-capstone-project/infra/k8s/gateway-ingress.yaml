# HTTP route from outside the cluster to the gateway Service, via Traefik
# (bundled with k3s). The k3d cluster was created with
# `-p "8000:80@loadbalancer"`, so from the host this is just
# http://localhost:8000 — the SAME address the compose/dev gateway used,
# which keeps Locust, the frontend, and Prometheus configs unchanged.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80

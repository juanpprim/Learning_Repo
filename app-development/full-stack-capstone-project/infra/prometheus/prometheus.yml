# Prometheus scrape config — one job per component of the data flow.
global:
  scrape_interval: 5s          # fast enough to watch a load test live

scrape_configs:
  # FastAPI gateway (runs on the host in dev; container in Tier C).
  - job_name: gateway
    static_configs:
      - targets: ["host.docker.internal:8000"]

  # Kafka: consumer lag, offsets, message rate (via kafka-exporter).
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # Spark Structured Streaming driver (PrometheusServlet on the UI port).
  - job_name: spark
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spark-consumer:4040"]

  # Host resources.
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # Tier C.5: k8s object state (pod/replica counts for the HPA panel).
  # kube-state-metrics runs in the k3d cluster; its NodePort 30080 is mapped
  # to the host by k3d, so we scrape it the same way we scrape the dev gateway.
  # (The `gateway` job above needs no change: with the k3d loadbalancer
  # publishing host port 8000, host.docker.internal:8000 now reaches the
  # gateway PODS through Traefik.)
  - job_name: kube-state-metrics
    static_configs:
      - targets: ["host.docker.internal:30080"]

# Prometheus scrape config — one job per component of the data flow.
global:
  scrape_interval: 5s          # fast enough to watch a load test live

scrape_configs:
  # FastAPI gateway (runs on the host in dev; container in Tier C).
  - job_name: gateway
    static_configs:
      - targets: ["host.docker.internal:8000"]

  # Kafka: consumer lag, offsets, message rate (via kafka-exporter).
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # Spark Structured Streaming driver (PrometheusServlet on the UI port).
  - job_name: spark
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spark-consumer:4040"]

  # Host resources.
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
